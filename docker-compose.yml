version: "3.8"

services:
  # ─── Keeper CLI（默认服务）─────────────────────────────────
  keeper:
    build: .
    container_name: keeper
    volumes:
      - keeper-data:/home/keeper/.keeper
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Docker 管理需要
    environment:
      - KEEPER_API_KEY=${KEEPER_API_KEY:-}
      - KEEPER_BASE_URL=${KEEPER_BASE_URL:-}
      - KEEPER_MODEL=${KEEPER_MODEL:-claude-sonnet-4-6}
      - KEEPER_LOG_LEVEL=${KEEPER_LOG_LEVEL:-INFO}
    networks:
      - keeper-net
    stdin_open: true
    tty: true

  # ─── Keeper API Server 模式 ────────────────────────────────
  keeper-api:
    build: .
    container_name: keeper-api
    command: ["python", "-m", "keeper.api.server"]
    ports:
      - "8900:8900"
    volumes:
      - keeper-data:/home/keeper/.keeper
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - KEEPER_API_KEY=${KEEPER_API_KEY:-}
      - KEEPER_BASE_URL=${KEEPER_BASE_URL:-}
      - KEEPER_MODEL=${KEEPER_MODEL:-claude-sonnet-4-6}
      - KEEPER_API_TOKEN=${KEEPER_API_TOKEN:-changeme}
      - KEEPER_LOG_LEVEL=${KEEPER_LOG_LEVEL:-INFO}
    networks:
      - keeper-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8900/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Prometheus（开发测试用，可选）─────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: keeper-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - keeper-net
    profiles:
      - monitoring

  # ─── Alertmanager（开发测试用，可选）────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: keeper-alertmanager
    ports:
      - "9093:9093"
    networks:
      - keeper-net
    profiles:
      - monitoring

volumes:
  keeper-data:
    driver: local

networks:
  keeper-net:
    driver: bridge
