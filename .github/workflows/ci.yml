name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: |
          flake8 keeper/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 keeper/ --count --max-line-length=120 --statistics --exit-zero

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=keeper --cov-report=term-missing

      - name: Check coverage
        run: |
          pytest tests/ --cov=keeper --cov-fail-under=50
